<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">ANE-RE research overview</title>
  <desc id="desc">Apple Neural Engine compiler research overview with verified metrics, public outcomes, and the ANE-RE research companion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050d18"/><stop offset="0.55" stop-color="#071423"/><stop offset="1" stop-color="#09101a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ffcb62"/><stop offset="1" stop-color="#e79a26"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#45d5ff"/><stop offset="1" stop-color="#2c6bff"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#2aa9ff" stop-opacity=".32"/><stop offset="1" stop-color="#2aa9ff" stop-opacity="0"/></radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".5"/></filter>
    <clipPath id="petClip"><rect x="748" y="1610" width="410" height="150" rx="12"/></clipPath>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}.mono{font-family:'SFMono-Regular',Consolas,monospace}
      .w{fill:#f4f7fb}.m{fill:#aebdca}.d{fill:#758a9d}.g{fill:#f5b642}.c{fill:#43cfff}.ok{fill:#49d982}.p{fill:#b875ff}
      .h1{font-size:82px;font-weight:800;letter-spacing:1px}.h2{font-size:24px;font-weight:750}.h3{font-size:19px;font-weight:700}.body{font-size:16px}.small{font-size:13px}.tiny{font-size:11px}
      .panel{fill:#0b1a2b;stroke:#284d67;stroke-width:1.5}.panel2{fill:#0d2034;stroke:#2c5570;stroke-width:1.5}.line{stroke:#29465e;stroke-width:1}
    </style>
  </defs>

  <rect width="1200" height="1800" fill="url(#bg)"/>
  <circle cx="985" cy="90" r="290" fill="url(#glow)"/>
  <circle cx="102" cy="92" r="170" fill="#f5a623" opacity=".06" filter="url(#soft)"/>

  <!-- abstract chip and signal field -->
  <g opacity=".9">
    <path d="M890 38h190l54 54-54 54H890l-54-54z" fill="#10283e" stroke="#3ecbff" stroke-width="2"/>
    <path d="M917 58h136l34 34-34 34H917l-34-34z" fill="#0a1827" stroke="#f5b642"/>
    <g stroke="#3185b7" opacity=".65"><path d="M835 92H760"/><path d="M1135 92h48"/><path d="M940 38V9"/><path d="M980 38V1"/><path d="M1020 38V9"/><path d="M940 146v30"/><path d="M980 146v38"/><path d="M1020 146v30"/></g>
    <g fill="#43cfff"><circle cx="784" cy="54" r="2"/><circle cx="808" cy="120" r="2"/><circle cx="1158" cy="48" r="2"/><circle cx="1108" cy="174" r="2"/></g>
  </g>

  <text x="42" y="90" class="sans w h1">ANE-<tspan fill="url(#gold)">RE</tspan></text>
  <text x="46" y="132" class="sans w" font-size="25">Apple Neural Engine Compiler Research</text>
  <text x="46" y="164" class="sans g" font-size="17">Measure what runs. Build the future of local intelligence.</text>

  <g class="sans" font-size="12" font-weight="700">
    <g transform="translate(46 193)"><rect width="104" height="34" rx="10" fill="#0b1b2b" stroke="#39c9ff"/><text x="52" y="22" text-anchor="middle" class="c">RESEARCH</text></g>
    <g transform="translate(162 193)"><rect width="114" height="34" rx="10" fill="#0b1b2b" stroke="#aa6dff"/><text x="57" y="22" text-anchor="middle" class="p">EXPLORATION</text></g>
    <g transform="translate(288 193)"><rect width="126" height="34" rx="10" fill="#0b1b2b" stroke="#42d4b2"/><text x="63" y="22" text-anchor="middle" fill="#42d4b2">MEASUREMENT</text></g>
    <g transform="translate(426 193)"><rect width="112" height="34" rx="10" fill="#0b1b2b" stroke="#f5b642"/><text x="56" y="22" text-anchor="middle" class="g">DISCOVERY</text></g>
  </g>

  <!-- status bar -->
  <rect x="28" y="250" width="1144" height="68" rx="15" class="panel"/>
  <g class="sans">
    <g transform="translate(50 266)"><text class="d tiny">STATUS</text><text y="27" class="ok h3">ACTIVE RESEARCH</text></g>
    <g transform="translate(244 266)"><text class="d tiny">LANGUAGE</text><text y="27" fill="#ff7c3d" class="h3">SWIFT</text></g>
    <g transform="translate(390 266)"><text class="d tiny">PLATFORM</text><text y="27" class="c h3">macOS</text></g>
    <g transform="translate(530 266)"><text class="d tiny">HARDWARE</text><text y="27" class="p h3">A18 Pro</text></g>
    <g transform="translate(730 266)"><text class="d tiny">EXECUTION</text><text y="27" class="ok h3">USERSPACE</text></g>
    <g transform="translate(920 266)"><text class="d tiny">EVIDENCE</text><text y="27" class="g h3">LABEL-BACKED</text></g>
  </g>

  <!-- intro -->
  <rect x="28" y="340" width="1144" height="250" rx="18" class="panel" filter="url(#shadow)"/>
  <text x="52" y="382" class="sans w" font-size="28" font-weight="750">Pushing the frontier of what is possible on Apple Silicon.</text>
  <text x="52" y="421" class="sans m body"><tspan x="52">ANE-RE authors graphs directly, compiles them through Apple’s public toolchain,</tspan><tspan x="52" dy="26">and measures what actually executes on the Neural Engine.</tspan></text>
  <text x="52" y="491" class="sans m body"><tspan x="52">Native Swift tooling, controlled experiments, preserved negative results, and separate gates</tspan><tspan x="52" dy="26">for placement, correctness, stability, and performance.</tspan></text>
  <g class="sans small">
    <text x="56" y="558" class="g">◆ Hand-authored graphs</text><text x="276" y="558" class="g">◆ Public compiler path</text><text x="545" y="558" class="g">◆ Measured evidence</text><text x="740" y="558" class="g">◆ Stateful &amp; multi-token execution</text>
  </g>

  <!-- metric header -->
  <text x="32" y="630" class="sans g h2">KEY METRICS — LATEST PROVEN</text>
  <text x="390" y="630" class="sans d small">Configuration-specific. No blended benchmark mythology.</text>

  <!-- six cards -->
  <g class="sans">
    <g transform="translate(28 652)"><rect width="360" height="150" rx="16" class="panel2"/><circle cx="42" cy="40" r="20" fill="none" stroke="#f5b642" stroke-width="3"/><path d="M42 40l11-12" stroke="#f5b642" stroke-width="3"/><text x="24" y="82" class="w" font-size="31" font-weight="800">51.6 tok/s</text><text x="24" y="111" class="w h3">Production K=1 floor</text><text x="24" y="134" class="m small">19.4 ms/token</text></g>
    <g transform="translate(420 652)"><rect width="360" height="150" rx="16" class="panel2"/><path d="M25 57h10V42h10v15h10V30h10v27h10V20h10" fill="none" stroke="#f5b642" stroke-width="4"/><text x="24" y="82" class="w" font-size="31" font-weight="800">102.1 tok/s</text><text x="24" y="111" class="w h3">Production B=4 aggregate</text><text x="24" y="134" class="m small">four independent lanes</text></g>
    <g transform="translate(812 652)"><rect width="360" height="150" rx="16" class="panel2"/><rect x="25" y="21" width="42" height="42" rx="7" fill="none" stroke="#43cfff" stroke-width="3"/><text x="24" y="82" class="w" font-size="31" font-weight="800">23.78 tok/s</text><text x="24" y="111" class="w h3">Hand-authored split 28L</text><text x="24" y="134" class="m small">two-dispatch decode</text></g>
    <g transform="translate(28 820)"><rect width="360" height="150" rx="16" class="panel2"/><path d="M26 22h42v40H26zM47 22v40" fill="none" stroke="#49d982" stroke-width="3"/><text x="24" y="82" class="w" font-size="31" font-weight="800">16.8033 pplx</text><text x="24" y="111" class="w h3">WikiText-2 full valset</text><text x="24" y="134" class="m small">Apple reference 14.79 (+2.01)</text></g>
    <g transform="translate(420 820)"><rect width="360" height="150" rx="16" class="panel2"/><path d="M24 43h12l8-18 10 36 10-29 9 11h18" fill="none" stroke="#b875ff" stroke-width="3"/><text x="24" y="82" class="w" font-size="31" font-weight="800">0% GPU</text><text x="24" y="111" class="w h3">Production decode path</text><text x="24" y="134" class="m small">ANE-resident serving</text></g>
    <g transform="translate(812 820)"><rect width="360" height="150" rx="16" class="panel2"/><path d="M25 22h44v44H25zM34 31h26v26H34z" fill="none" stroke="#ef8735" stroke-width="3"/><text x="24" y="82" class="w" font-size="31" font-weight="800">Negatives kept</text><text x="24" y="111" class="w h3">Closed paths published</text><text x="24" y="134" class="m small">no vanished failures</text></g>
  </g>

  <!-- breakthrough -->
  <rect x="28" y="994" width="1144" height="124" rx="17" fill="#111a24" stroke="#f5b642" stroke-width="2"/>
  <text x="62" y="1030" class="sans g h2">MAJOR BREAKTHROUGH</text>
  <text x="62" y="1068" class="sans w" font-size="24" font-weight="750">Hand-authored 28-layer LUT4 Qwen2.5-1.5B runs on the Apple Neural Engine</text>
  <text x="62" y="1096" class="sans m body">Hand-authored graphs · public compiler path · full WikiText-2 validation</text>
  <rect x="926" y="1013" width="215" height="84" rx="12" fill="#081521" stroke="#284d67"/>
  <text x="1033" y="1051" text-anchor="middle" class="sans g" font-size="30" font-weight="800">16.8033</text><text x="1033" y="1078" text-anchor="middle" class="sans m small">pplx · PROVEN</text>

  <!-- three columns -->
  <g class="sans">
    <rect x="28" y="1144" width="358" height="430" rx="17" class="panel"/><text x="50" y="1182" class="g h2">RESEARCH AREAS</text>
    <text x="50" y="1222" class="w h3">Graph authoring</text><text x="50" y="1246" class="m small">production-scale graphs authored without conversion folklore</text>
    <text x="50" y="1287" class="w h3">Compiler &amp; admission</text><text x="50" y="1311" class="m small">what the public toolchain accepts, rejects, and places</text>
    <text x="50" y="1352" class="w h3">Program inspection</text><text x="50" y="1376" class="m small">compiled programs characterized on-device</text>
    <text x="50" y="1417" class="w h3">Stateful execution</text><text x="50" y="1441" class="m small">KV reads, writes, continuity and update behavior</text>
    <text x="50" y="1482" class="w h3">Performance science</text><text x="50" y="1506" class="m small">throughput floors, batch levers, compute vs bandwidth</text>

    <rect x="421" y="1144" width="358" height="430" rx="17" class="panel"/><text x="443" y="1182" class="g h2">CURRENT VERIFIED RESULTS</text>
    <text x="443" y="1222" class="ok h3">✓ Full ANE placement controls</text><text x="443" y="1246" class="m small">authored controls reached full ANE placement</text>
    <text x="443" y="1287" class="ok h3">✓ State machinery on ANE</text><text x="443" y="1311" class="m small">read, write and update paths measured on-device</text>
    <text x="443" y="1352" class="ok h3">✓ Multi-lane independence</text><text x="443" y="1376" class="m small">independent lanes under measured batch paths</text>
    <text x="443" y="1417" class="ok h3">✓ On-device program audit</text><text x="443" y="1441" class="m small">compiled artifacts inspected after public compile</text>
    <text x="443" y="1482" class="ok h3">✓ Bandwidth-only model falsified</text><text x="443" y="1506" class="m small">production 28L execution is compute-dominated</text>

    <rect x="814" y="1144" width="358" height="430" rx="17" class="panel"/><text x="836" y="1182" class="g h2">PUBLIC RESEARCH FRONTIER</text>
    <text x="836" y="1222" class="c h3">Batch throughput legality</text><text x="836" y="1246" class="m small">keep batch wins honest under real state</text>
    <text x="836" y="1287" class="c h3">Multi-token throughput</text><text x="836" y="1311" class="m small">fair multi-token speed without fantasy ceilings</text>
    <text x="836" y="1352" class="c h3">Full-depth residency</text><text x="836" y="1376" class="m small">prove residency at production depth</text>
    <text x="836" y="1417" class="c h3">Cross-architecture state</text><text x="836" y="1441" class="m small">port measured state patterns carefully</text>
    <text x="836" y="1482" class="c h3">Capability catalog</text><text x="836" y="1506" class="m small">publish outcomes; keep recipes private</text>
  </g>

  <!-- principles and pet -->
  <rect x="28" y="1600" width="682" height="180" rx="17" class="panel"/>
  <text x="50" y="1638" class="sans g h2">RESEARCH PRINCIPLES</text>
  <g class="sans body"><text x="50" y="1675" class="ok">✓ Evidence over narrative</text><text x="270" y="1675" class="ok">✓ Placement is not parity</text><text x="490" y="1675" class="ok">✓ Negative results remain results</text><text x="50" y="1712" class="ok">✓ Configuration-specific metrics</text><text x="310" y="1712" class="ok">✓ Supersede errors openly</text><text x="520" y="1712" class="ok">✓ Protect what is strategic</text></g>

  <rect x="734" y="1600" width="438" height="180" rx="17" class="panel"/>
  <image x="748" y="1610" width="410" height="150" preserveAspectRatio="xMidYMid slice" clip-path="url(#petClip)" href="img/mako-project-pet.jpg"/>
  <rect x="748" y="1720" width="410" height="44" rx="10" fill="#07131f" opacity=".9"/><text x="953" y="1748" text-anchor="middle" class="sans g" font-size="14" font-weight="700">MAKO</text>

  <text x="600" y="1790" text-anchor="middle" class="sans d small">ANE-RE · Built with Swift · Measured on A18 Pro · Led by Nayte Wilson</text>
</svg>
